plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'war'
    id 'java'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}
dependencies {
    // Spring Context (нужен для @Configuration, @ComponentScan)
    implementation 'org.springframework:spring-context:6.1.14'

    // Spring Web MVC (нужен для @EnableWebMvc, @Controller, @ResponseBody)
    implementation 'org.springframework:spring-webmvc:6.1.14'

    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.0'

    // PostgreSQL драйвер (одна строка!)
    implementation 'org.postgresql:postgresql:42.7.4'

    // H2 для тестов
    testImplementation 'com.h2database:h2:2.2.224'

    // Spring JDBC (для JdbcTemplate)
    implementation 'org.springframework:spring-jdbc:6.1.14'

    implementation 'jakarta.annotation:jakarta.annotation-api:2.1.1'

    // Servlet API (provided - Tomcat предоставит во время выполнения)
    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'

    // ✅ JUnit 5 (ТОЛЬКО ЭТО, НИКАКИХ ДРУГИХ JUnit зависимостей!)
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.0'

    // ✅ Spring Test
    testImplementation 'org.springframework:spring-test:6.1.14'

    testImplementation 'org.hamcrest:hamcrest:2.2'
    // ✅ Mockito для тестов
    testImplementation 'org.mockito:mockito-core:5.7.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.7.0'
    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
        showStandardStreams = true
        exceptionFormat = 'full'
    }
    // Указываем тестовый профиль
    systemProperty "spring.profiles.active", "test"
}


war {
    archiveFileName = 'blog.war'

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE  // или INCLUDE, если нужно

    // Если вы копируете ресурсы вручную, убедитесь, что они не дублируются
    from('src/main/resources') {
        include '**/*.properties'
        into 'WEB-INF/classes'
    }
}

