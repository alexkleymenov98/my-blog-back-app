plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'war'
    id 'java'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Spring Context (нужен для @Configuration, @ComponentScan)
    implementation 'org.springframework:spring-context:6.1.14'

    // Spring Web MVC (нужен для @EnableWebMvc, @Controller, @ResponseBody)
    implementation 'org.springframework:spring-webmvc:6.1.14'

    // Servlet API (provided - Tomcat предоставит во время выполнения)
    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'
    // Use JUnit test framework.
    testImplementation libs.junit

    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

war {
    archiveFileName = 'blog.war'

    // Копируем дополнительные ресурсы если нужно
    from('src/main/resources') {
        include '**/*.properties'
        into 'WEB-INF/classes'
    }
}

